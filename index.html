<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bounce Snake 🐍</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4fc3f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js');
    });
  }
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(160deg, #ffe0f0 0%, #fff4c2 50%, #d0f0ff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Fredoka One', cursive;
  }

  #adTop {
    width: 400px;
    background: linear-gradient(90deg, #ffb3d9, #ffd6a5, #ffffb3);
    border: 3px solid #ff85c0;
    border-bottom: none;
    padding: 8px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 20px 20px 0 0;
  }
  #adTop .ad-tag { font-size: 8px; color: #ff5fa0; letter-spacing: 1px; font-family: 'Nunito', sans-serif; font-weight: 900; }
  #adTop .ad-text { font-size: 9px; color: #cc3377; animation: adBounce 2s ease-in-out infinite; font-family: 'Nunito', sans-serif; font-weight: 700; }
  @keyframes adBounce {
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-2px); }
  }

  #gameWrapper {
    position: relative;
    width: 400px;
    height: 580px;
  }

  canvas {
    display: block;
    border-left: 3px solid #ff85c0;
    border-right: 3px solid #ff85c0;
  }

  #adBottom {
    width: 400px;
    background: linear-gradient(90deg, #d0f0ff, #e8d5ff, #ffd6f0);
    border: 3px solid #85c0ff;
    border-top: 3px solid #ff85c0;
    padding: 9px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 0 0 20px 20px;
  }
  #adBottom .ad-tag { font-size: 8px; color: #5588ff; font-family: 'Nunito', sans-serif; font-weight: 900; }
  #adBtn {
    background: linear-gradient(135deg, #ff85c0, #ffaa55);
    color: #fff;
    border: none;
    font-family: 'Fredoka One', cursive;
    font-size: 10px;
    padding: 6px 16px;
    cursor: pointer;
    border-radius: 20px;
    box-shadow: 0 4px 0 #cc5588;
    animation: btnBounce 1.5s ease-in-out infinite;
  }
  @keyframes btnBounce {
    0%,100%{ transform: translateY(0); box-shadow: 0 4px 0 #cc5588; }
    50%{ transform: translateY(-3px); box-shadow: 0 7px 0 #cc5588; }
  }
  #adBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #cc5588; }

  /* REVIVE OFFER */
  #reviveOffer {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10,10,30,0.88);
    z-index: 210;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border-radius: 0;
  }
  #reviveOffer.show { display: flex; }
  .revive-title {
    font-family: 'Fredoka One', cursive;
    font-size: 38px;
    color: #fff;
    text-shadow: 0 0 20px #ff4488;
    animation: revivePulse 0.6s ease-out;
  }
  @keyframes revivePulse {
    0%  { transform: scale(0.4); opacity: 0; }
    70% { transform: scale(1.15); }
    100%{ transform: scale(1);   opacity: 1; }
  }
  .revive-sub {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    color: #ffbbdd;
  }
  .revive-score {
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    color: #FFD700;
    text-shadow: 0 0 10px #ffaa00;
    margin-bottom: 4px;
  }
  .revive-btn {
    background: linear-gradient(135deg, #00cc66, #00aaff);
    color: white;
    border: none;
    font-family: 'Fredoka One', cursive;
    font-size: 15px;
    padding: 14px 28px;
    cursor: pointer;
    border-radius: 30px;
    box-shadow: 0 6px 0 #007744, 0 0 20px rgba(0,200,100,0.5);
    animation: btnBounce 1.2s ease-in-out infinite;
    margin-top: 6px;
  }
  .revive-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #007744; }
  .revive-timer-wrap {
    width: 200px;
    height: 8px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 4px;
  }
  .revive-timer-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #00cc66, #ffcc00);
    border-radius: 4px;
    transition: width 0.1s linear;
  }
  .revive-skip {
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    margin-top: 2px;
    text-decoration: underline;
  }
  .revive-skip:hover { color: rgba(255,255,255,0.7); }
  /* REVIVE flash effect on canvas */
  #c.reviving {
    animation: reviveFlash 0.6s ease-out;
  }
  @keyframes reviveFlash {
    0%  { filter: brightness(3) saturate(0); }
    100%{ filter: brightness(1) saturate(1); }
  }

  #interstitial {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(255,220,240,0.96);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    border-radius: 0;
  }
  #interstitial.show { display: flex; }
  .ad-card {
    width: 80%;
    border: 4px solid #ff85c0;
    border-radius: 24px;
    padding: 22px 18px;
    text-align: center;
    background: white;
    box-shadow: 0 8px 0 #ffb3d9;
  }
  .ad-card-icon { font-size: 50px; margin-bottom: 10px; }
  .ad-card-title { font-family: 'Fredoka One', cursive; font-size: 18px; color: #ff5fa0; margin-bottom: 8px; }
  .ad-card-sub { font-size: 10px; color: #aa77aa; line-height: 2; margin-bottom: 14px; font-family: 'Nunito', sans-serif; font-weight: 700; }
  #skipWrap { font-size: 9px; color: #bbaacc; font-family: 'Nunito', sans-serif; }
  #skipWrap span { color: #ff88bb; }
  #skipNow {
    display: none;
    background: linear-gradient(135deg, #ff85c0, #ffaa55);
    color: white;
    border: none;
    font-family: 'Fredoka One', cursive;
    font-size: 12px;
    padding: 8px 22px;
    cursor: pointer;
    border-radius: 20px;
    margin-top: 10px;
    box-shadow: 0 4px 0 #cc5588;
  }
</style>
</head>
<body>

<!-- TOP AD -->
<div id="adTop">
  <span class="ad-tag">⭐ AD</span>
  <span class="ad-text">🍭 Candy Crush Friends — Play FREE! 🍬</span>
  <span class="ad-tag">✕</span>
</div>

<div id="gameWrapper">
  <canvas id="c" width="400" height="580"></canvas>

  <!-- REVIVE OFFER (shown on death, before ad) -->
  <div id="reviveOffer">
    <div class="revive-title">😵 Oh no!</div>
    <div class="revive-sub">Your snake got stuck!</div>
    <div class="revive-score" id="reviveScore"></div>
    <button class="revive-btn" id="watchAdBtn">▶ Watch Ad to Continue!</button>
    <div class="revive-timer-wrap">
      <div class="revive-timer-bar" id="reviveBar"></div>
    </div>
    <div class="revive-skip" id="reviveSkipBtn">✕ No thanks, end game</div>
  </div>

  <!-- INTERSTITIAL AD (plays after tapping watch ad) -->
  <div id="interstitial">
    <div style="font-size:8px;color:#cc88aa;align-self:flex-end;margin-right:16px;font-family:'Nunito',sans-serif;">Advertisement</div>
    <div class="ad-card">
      <div class="ad-card-icon">🦄</div>
      <div class="ad-card-title">UNICORN DASH!</div>
      <div class="ad-card-sub">Run, jump & collect stars! 🌟<br>Loved by 5 million kids! 🎉<br>⭐⭐⭐⭐⭐</div>
      <div id="skipWrap">Skip in <span id="cd">5</span>s ⏳</div>
      <button id="skipNow" onclick="closeAd()">▶ REVIVE & KEEP PLAYING! 🐍</button>
    </div>
  </div>
</div>

<!-- BOTTOM AD -->
<div id="adBottom">
  <span class="ad-tag">🌈 SPONSORED</span>
  <button id="adBtn">🎁 PLAY FREE NOW!</button>
  <span class="ad-tag">ℹ️</span>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── SPEED CONSTANTS ───────────────────────────────────────────
const MIN_SPEED   = 1.0;
const MAX_SPEED   = 9.0;
const SPEED_SCALE = 0.045;
let state = 'start'; // start | playing | dead | ad
let score = 0, highScore = 0, deathCount = 0;

// ── BIRD ───────────────────────────────────────────────────────
const BIRD_SPEED = 2.0;
const bird = {
  x: W / 2,
  y: H / 2,
  r: 16,
  angle: 0,
  vx: BIRD_SPEED,   // horizontal velocity (tap flips this)
  vy: BIRD_SPEED,   // vertical velocity (bounces off top/bottom)
  trail: [],
  stuckTimer: 0,
  reset() {
    this.x = W / 2;
    this.y = H / 2;
    this.vx = BIRD_SPEED;
    this.vy = BIRD_SPEED;
    this.trail = [];
    this.stuckTimer = 0;
  },
  get dir() { return this.vx > 0 ? 1 : -1; }
};

// ── WALLS ──────────────────────────────────────────────────────
// Walls come from top or bottom. Each has a gap the bird must pass through.
// Some walls slide left/right.
const WALL_H = 18;
const GAP_W = 110;
const WALL_SPEED = 2.2;
let walls = [];
let wallTimer = 0;
const WALL_INTERVAL = 95; // frames between spawns

function spawnWall() {
  const fromTop = Math.random() < 0.5;
  const y = fromTop ? -WALL_H : H + WALL_H;
  const vy = fromTop ? WALL_SPEED : -WALL_SPEED;

  // gap center X
  const minGapX = GAP_W / 2 + 10;
  const maxGapX = W - GAP_W / 2 - 10;
  const gapX = Math.random() * (maxGapX - minGapX) + minGapX;

  // moving wall?
  const moves = score > 3 && Math.random() < 0.45;
  const moveSpeed = (Math.random() * 1.2 + 0.4) * (Math.random() < 0.5 ? 1 : -1);

  walls.push({ y, vy, gapX, moves, moveSpeed, passed: false, alpha: 1, colorIdx: (wallColorIdx++) % WALL_COLORS.length });
}

// ── PARTICLES ─────────────────────────────────────────────────
let particles = [];
function burst(x, y, color) {
  const colors = ['#ffb3d9','#ffd6a5','#ffffb3','#b3ffcc','#b3d9ff','#ffaaff'];
  for (let i = 0; i < 14; i++) {
    const a = (Math.PI * 2 / 14) * i + Math.random() * 0.3;
    const spd = Math.random() * 4 + 1;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      life: 1, color: colors[Math.floor(Math.random()*colors.length)], size: Math.random()*5+3 });
  }
}

// ── SKY DECORATIONS ───────────────────────────────────────────
// Three cloud layers: far (slow, small, faint), mid, near (fast, large, bright)
const cloudLayers = [
  // Far layer
  [ {x:30,  y:80,  s:0.55, sp:0.12},
    {x:170, y:55,  s:0.5,  sp:0.10},
    {x:310, y:95,  s:0.52, sp:0.13} ],
  // Mid layer
  [ {x:80,  y:130, s:0.75, sp:0.22},
    {x:240, y:110, s:0.78, sp:0.20},
    {x:370, y:145, s:0.70, sp:0.18} ],
  // Near layer
  [ {x:50,  y:200, s:1.05, sp:0.38},
    {x:200, y:185, s:1.1,  sp:0.35},
    {x:350, y:210, s:0.95, sp:0.40} ],
];
const cloudAlphas = [0.40, 0.62, 0.88];

// Tiny birds flying across the sky
const skyBirds = Array.from({length: 5}, (_, i) => ({
  x: Math.random() * W, y: 60 + Math.random() * 120,
  speed: 0.4 + Math.random() * 0.5, wing: 0, wDir: 1
}));

// Floating sparkles
const sparkles = Array.from({length: 16}, () => ({
  x: Math.random() * W, y: 40 + Math.random() * (H - 120),
  tw: Math.random() * Math.PI * 2, r: Math.random() * 5 + 3
}));

let sunAngle = 0;

function drawCloud(x, y, scale, alpha) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = '#cce8ff';
  ctx.shadowBlur = 12;
  const b = 40 * scale;
  // Main puffs
  ctx.beginPath(); ctx.arc(x,        y,        b * 0.60, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + b*0.7, y - b*0.15, b * 0.48, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x - b*0.6, y - b*0.05, b * 0.44, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + b*0.35,y - b*0.42, b * 0.40, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x - b*0.2, y - b*0.38, b * 0.36, 0, Math.PI*2); ctx.fill();
  // Flat bottom
  ctx.fillStyle = '#f0f8ff';
  ctx.fillRect(x - b*1.1, y, b*2.2, b*0.5);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

function drawBg() {
  // ── Deep sky gradient ───────────────────────────────────────
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,    '#4fc3f7');
  sky.addColorStop(0.28, '#81d4fa');
  sky.addColorStop(0.55, '#b3e5fc');
  sky.addColorStop(0.80, '#c8f5d0');
  sky.addColorStop(1,    '#dff9e8');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // ── Rainbow — small & faint, tucked top-right corner ────────
  const rainCols = [
    'rgba(255,80,80,0.10)',
    'rgba(255,165,0,0.10)',
    'rgba(255,230,0,0.10)',
    'rgba(100,210,80,0.10)',
    'rgba(30,150,255,0.10)',
    'rgba(160,80,220,0.09)',
  ];
  for (let i = 0; i < rainCols.length; i++) {
    ctx.beginPath();
    ctx.arc(W + 20, H * 0.12, 110 - i * 10, Math.PI, 2 * Math.PI);
    ctx.strokeStyle = rainCols[i];
    ctx.lineWidth = 9;
    ctx.stroke();
  }

  // ── Sun ─────────────────────────────────────────────────────
  sunAngle += 0.007;
  const sx = 52, sy = 62;
  // Outer soft halo
  const halo = ctx.createRadialGradient(sx, sy, 18, sx, sy, 58);
  halo.addColorStop(0,   'rgba(255,240,100,0.55)');
  halo.addColorStop(0.6, 'rgba(255,210,50,0.18)');
  halo.addColorStop(1,   'rgba(255,200,0,0)');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(sx, sy, 58, 0, Math.PI*2); ctx.fill();
  // Rays
  for (let i = 0; i < 12; i++) {
    const a = (Math.PI*2/12)*i + sunAngle;
    const r1 = 28, r2 = 42 + Math.sin(sunAngle*3 + i)*4;
    ctx.beginPath();
    ctx.moveTo(sx + Math.cos(a)*r1, sy + Math.sin(a)*r1);
    ctx.lineTo(sx + Math.cos(a)*r2, sy + Math.sin(a)*r2);
    ctx.strokeStyle = 'rgba(255,220,60,0.75)';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
  // Sun disc
  const disc = ctx.createRadialGradient(sx-5, sy-5, 3, sx, sy, 22);
  disc.addColorStop(0, '#fffde7');
  disc.addColorStop(0.5, '#FFD700');
  disc.addColorStop(1, '#FFA000');
  ctx.beginPath(); ctx.arc(sx, sy, 22, 0, Math.PI*2);
  ctx.fillStyle = disc; ctx.fill();
  // Sun face
  ctx.fillStyle = '#b8860b';
  ctx.beginPath(); ctx.arc(sx-7, sy-4, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+7, sy-4, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx, sy+4, 7, 0.1*Math.PI, 0.9*Math.PI); ctx.strokeStyle='#b8860b'; ctx.lineWidth=2; ctx.stroke();

  // ── Far clouds ──────────────────────────────────────────────
  cloudLayers[0].forEach(c => {
    if (state==='playing') { c.x -= c.sp; if (c.x < -120) c.x = W + 80; }
    drawCloud(c.x, c.y, c.s, cloudAlphas[0]);
  });

  // ── Mid clouds ──────────────────────────────────────────────
  cloudLayers[1].forEach(c => {
    if (state==='playing') { c.x -= c.sp; if (c.x < -150) c.x = W + 100; }
    drawCloud(c.x, c.y, c.s, cloudAlphas[1]);
  });

  // ── Tiny flying birds ────────────────────────────────────────
  skyBirds.forEach(b => {
    if (state === 'playing') {
      b.x += b.speed;
      if (b.x > W + 20) b.x = -20;
    }
    b.wing += 0.18 * b.wDir;
    if (Math.abs(b.wing) > 0.45) b.wDir *= -1;
    ctx.strokeStyle = 'rgba(60,100,160,0.55)';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    // Two curved wing arcs
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.quadraticCurveTo(b.x - 7, b.y - 6 + b.wing * 10, b.x - 13, b.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.quadraticCurveTo(b.x + 7, b.y - 6 + b.wing * 10, b.x + 13, b.y);
    ctx.stroke();
  });

  // ── Near (foreground) clouds ────────────────────────────────
  cloudLayers[2].forEach(c => {
    if (state==='playing') { c.x -= c.sp; if (c.x < -180) c.x = W + 120; }
    drawCloud(c.x, c.y, c.s, cloudAlphas[2]);
  });

  // ── Sparkles ────────────────────────────────────────────────
  sparkles.forEach(s => {
    s.tw += 0.04;
    const pulse = 0.3 + 0.4 * Math.sin(s.tw);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#fff9c4';
    // 4-point star
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.tw * 0.5);
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
      const a = (Math.PI/2)*i, b2 = (Math.PI/2)*i + Math.PI/4;
      ctx.lineTo(Math.cos(a)*s.r, Math.sin(a)*s.r);
      ctx.lineTo(Math.cos(b2)*s.r*0.4, Math.sin(b2)*s.r*0.4);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    ctx.globalAlpha = 1;
  });

  // ── Ground — simple quiet strip ─────────────────────────────
  const gGrad = ctx.createLinearGradient(0, H - 28, 0, H);
  gGrad.addColorStop(0, '#a8e06a');
  gGrad.addColorStop(1, '#7bbf44');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, H - 28, W, 28);
  // Single soft highlight line at top of ground
  ctx.strokeStyle = 'rgba(200,255,150,0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, H - 28); ctx.lineTo(W, H - 28);
  ctx.stroke();
}

// ── INPUT ─────────────────────────────────────────────────────
let target = { x: W / 2, y: H / 2, active: false };

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top)  * scaleY
  };
}

function startOrSetTarget(pos) {
  if (state === 'ad') return;
  if (state === 'start' || state === 'dead') { startGame(); return; }
  if (state === 'playing') {
    target.x = pos.x;
    target.y = pos.y;
    target.active = true;
  }
}

canvas.addEventListener('mousedown', e => startOrSetTarget(getCanvasPos(e)));
canvas.addEventListener('mousemove',  e => { if (state === 'playing' && e.buttons > 0) { target.x = getCanvasPos(e).x; target.y = getCanvasPos(e).y; target.active = true; } });
canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; startOrSetTarget(getCanvasPos(t)); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (state === 'playing') { const t = e.touches[0]; target.x = getCanvasPos(t).x; target.y = getCanvasPos(t).y; target.active = true; } }, { passive: false });

// ── GAME FLOW ──────────────────────────────────────────────────
function startGame() {
  bird.reset();
  walls = [];
  particles = [];
  score = 0;
  displayScore = 0;
  reviveUsed   = false;
  invincible   = 0;
  scoreAnims = [];
  plusAnims  = [];
  ripples    = [];
  scorePop   = 0;
  badgeGlow  = 0;
  wallTimer = 0;
  target.x = W / 2;
  target.y = H / 2;
  target.active = false;
  state = 'playing';
  spawnWall();
}

let reviveUsed    = false;   // only 1 revive per run
let invincible    = 0;       // frames of post-revive invincibility
let reviveCountdown = null;  // interval for the 5s offer timer

function die() {
  if (state !== 'playing') return;
  if (score > highScore) highScore = score;
  burst(bird.x, bird.y, '#ffb3d9');
  burst(bird.x, bird.y, '#ffffb3');

  // Offer revive if not already used this run
  if (!reviveUsed) {
    state = 'revive';
    showReviveOffer();
  } else {
    state = 'dead';
    deathCount++;
    if (deathCount % 3 === 0) setTimeout(showAd, 700);
  }
}

// ── REVIVE OFFER ──────────────────────────────────────────────
function showReviveOffer() {
  const el = document.getElementById('reviveOffer');
  document.getElementById('reviveScore').textContent = '⭐ Score: ' + score;
  el.classList.add('show');

  let timeLeft = 1.0; // fraction 1→0 over 5 seconds
  const bar = document.getElementById('reviveBar');
  bar.style.width = '100%';

  reviveCountdown = setInterval(() => {
    timeLeft -= 0.02; // ~50fps ticks over 5s
    bar.style.width = Math.max(0, timeLeft * 100) + '%';
    if (timeLeft <= 0) {
      clearInterval(reviveCountdown);
      hideReviveOffer();
      state = 'dead';
      deathCount++;
      if (deathCount % 3 === 0) setTimeout(showAd, 400);
    }
  }, 100);
}

function hideReviveOffer() {
  clearInterval(reviveCountdown);
  document.getElementById('reviveOffer').classList.remove('show');
}

// ── Rewarded Ad (the REVIVE button) ──────────────────────────
function showRewardedAd(onRewarded, onClosed) {

  if (!ADMOB_CONFIG.useRealAds) {
    // ── SIMULATION (remove when useRealAds = true) ────────────
    simulateRewardedAd();
    return;
  }

  // ── REAL AdMob Rewarded Ad via adsbygoogle ─────────────────
  // Note: Rewarded ads on web require the AdMob Web Interstitial API
  // For Android WebView, the native AdManager.cs handles this instead
  try {

      google_ad_client:   ADMOB_CONFIG.publisherId,
      google_ad_slot:     ADMOB_CONFIG.rewardedId.split('/')[1],

    simulateRewardedAd();
  }
}

// ── Interstitial Ad (every 3 deaths) ─────────────────────────
function showInterstitialAd(onClosed) {
  if (!ADMOB_CONFIG.useRealAds) {
    simulateInterstitialAd(onClosed);
    return;
  }
  try {
    (window.adsbygoogle = window.adsbygoogle || []).push({
      google_ad_client: ADMOB_CONFIG.publisherId,
      google_ad_slot:   ADMOB_CONFIG.interstitialId.split('/')[1],

        if (event.type === 'close') onClosed?.();
      }
    });
  } catch(e) {
    console.warn('[Ads] Interstitial failed:', e);
    onClosed?.();
  }
}

// ── Simulation (safe fake ads for testing) ────────────────────
function simulateRewardedAd() {
  state = 'ad';
  document.getElementById('interstitial').classList.add('show');
  document.getElementById('skipNow').style.display = 'none';
  document.getElementById('skipNow').textContent = '▶ REVIVE & KEEP PLAYING! 🐍';
  document.getElementById('skipNow').onclick = () => {
    clearInterval(cdInterval);
    document.getElementById('interstitial').classList.remove('show');
    resetSkipWrap();
    _rewardCallback?.();   // ← reward granted here
    _rewardCallback = null;
    _closeCallback  = null;
  };

  let t = 5;
  document.getElementById('skipWrap').innerHTML = 'Skip in <span id="cd">' + t + '</span>s ⏳';
  cdInterval = setInterval(() => {
    t--;
    const el = document.getElementById('cd');
    if (el) el.textContent = t;
    if (t <= 0) {
      clearInterval(cdInterval);
      document.getElementById('skipWrap').textContent = 'Ad complete! ✅';
      document.getElementById('skipNow').style.display = 'inline-block';
    }
  }, 1000);
}

function simulateInterstitialAd(onClosed) {
  if (state !== 'dead') return;
  state = 'ad';
  document.getElementById('interstitial').classList.add('show');
  document.getElementById('skipNow').textContent = 'CONTINUE ▶';
  document.getElementById('skipNow').style.display = 'none';
  document.getElementById('skipNow').onclick = () => {
    clearInterval(cdInterval);
    document.getElementById('interstitial').classList.remove('show');
    resetSkipWrap();
    state = 'dead';
    onClosed?.();
  };

  let t = 5;
  document.getElementById('skipWrap').innerHTML = 'Skip in <span id="cd">' + t + '</span>s ⏳';
  cdInterval = setInterval(() => {
    t--;
    const el = document.getElementById('cd');
    if (el) el.textContent = t;
    if (t <= 0) {
      clearInterval(cdInterval);
      document.getElementById('skipWrap').textContent = '';
      document.getElementById('skipNow').style.display = 'inline-block';
    }
  }, 1000);
}

function resetSkipWrap() {
  document.getElementById('skipWrap').innerHTML = 'Skip in <span id="cd">5</span>s ⏳';
  document.getElementById('skipNow').style.display = 'none';
}

// ── Game-level ad triggers ────────────────────────────────────
function onWatchAd() {
  hideReviveOffer();
  showRewardedAd(
    () => revivePlayer(),       // reward granted → revive snake
    () => {                     // ad closed without reward → death
      if (state === 'ad') { state = 'dead'; }
    }
  );
}

function onSkipRevive() {
  hideReviveOffer();
  state = 'dead';
  deathCount++;
  if (deathCount % 3 === 0)
    setTimeout(() => showInterstitialAd(() => {}), 400);
}

function revivePlayer() {
  reviveUsed    = true;
  bird.stuckTimer = 0;
  invincible    = 180;
  bird.vx       = 2.5;
  bird.vy       = -2.5;
  walls.forEach(w => w.passed = false);
  scoreAnims = []; plusAnims = []; ripples = [];
  state = 'playing';
  const canvas = document.getElementById('c');
  canvas.classList.add('reviving');
  setTimeout(() => canvas.classList.remove('reviving'), 600);
}

// Regular interstitial every 3 deaths
function showAd() {
  deathCount++;
  if (deathCount % 3 === 0)
    setTimeout(() => showInterstitialAd(() => {}), 400);
}

window.closeAd = () => {};   // kept for safety

// ── Init ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  initAds();
  document.getElementById('watchAdBtn').addEventListener('click', onWatchAd);
  document.getElementById('reviveSkipBtn').addEventListener('click', onSkipRevive);
});



const WALL_COLORS = [
  ['#ff6eb4','#ff9de2'],
  ['#ffaa33','#ffdd88'],
  ['#55ddaa','#aaffdd'],
  ['#7799ff','#bbccff'],
  ['#ff7755','#ffbb99'],
];
let wallColorIdx = 0;

function drawWalls() {
  walls.forEach((w, wi) => {
    const gLeft  = w.gapX - GAP_W/2;
    const gRight = w.gapX + GAP_W/2;
    const wTop   = w.y - WALL_H/2;
    const [c1, c2] = WALL_COLORS[w.colorIdx || 0];

    // Shadow
    ctx.shadowColor = 'rgba(0,0,0,0.15)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 4;

    // Left block
    const lg = ctx.createLinearGradient(0, wTop, 0, wTop + WALL_H);
    lg.addColorStop(0, c2); lg.addColorStop(1, c1);
    ctx.fillStyle = lg;
    roundRect(0, wTop, gLeft, WALL_H, 8);

    // Right block
    roundRect(gRight, wTop, W - gRight, WALL_H, 8);
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    // Shine stripe
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    roundRect(2, wTop+2, gLeft-4, WALL_H*0.35, 4);
    roundRect(gRight+2, wTop+2, W-gRight-4, WALL_H*0.35, 4);

    // Gap star reward emoji
    ctx.font = '16px serif';
    ctx.textAlign = 'center';
    ctx.fillText('⭐', w.gapX, w.y + 6);

    // Moving indicator
    if (w.moves) {
      ctx.font = '11px serif';
      ctx.fillText('↔️', w.gapX, w.y - 14);
    }
  });
  ctx.textAlign = 'left';
}

function roundRect(x, y, w, h, r) {
  if (w <= 0) return;
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  ctx.fill();
}

function drawBird() {
  const x = bird.x, y = bird.y;
  const stuckRatio = Math.min(bird.stuckTimer / 60, 1);
  const t = Date.now();

  // ── Target line ─────────────────────────────────────────────
  if (target.active && state === 'playing') {
    const tdx = target.x - x, tdy = target.y - y;
    const tdist = Math.sqrt(tdx*tdx + tdy*tdy);
    const speedRatio = Math.min(tdist / 200, 1);
    const rc = Math.floor(80 + 175 * speedRatio);
    const gc = Math.floor(200 - 140 * speedRatio);
    ctx.save();
    ctx.strokeStyle = `rgba(${rc},${gc},60,0.75)`;
    ctx.lineWidth = 1.5 + speedRatio * 3.5;
    ctx.setLineDash([6, 5]);
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(target.x, target.y); ctx.stroke();
    ctx.setLineDash([]);
    const em = speedRatio > 0.65 ? '🔥' : speedRatio > 0.3 ? '⚡' : '🎯';
    ctx.font = `${16 + Math.floor(speedRatio * 12)}px serif`;
    ctx.textAlign = 'center'; ctx.globalAlpha = 0.92;
    ctx.fillText(em, target.x, target.y + 8);
    if (tdist > 50) {
      ctx.font = '10px "Fredoka One"';
      ctx.fillStyle = `rgb(${rc},${gc},60)`;
      ctx.globalAlpha = 0.85;
      ctx.fillText(speedRatio > 0.65 ? 'FAST!' : speedRatio > 0.3 ? 'GO!' : 'SLOW', target.x, target.y - 14);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // ── Snake body uses trail as body segments ───────────────────
  // Build full snake path: head = bird.x/y, body = trail (reversed)
  const bodyPts = [];
  for (let i = bird.trail.length - 1; i >= 0; i--) bodyPts.push(bird.trail[i]);
  bodyPts.unshift({ x, y });

  const SEG = 10; // number of body segments to draw
  const pts = bodyPts.slice(0, Math.min(SEG, bodyPts.length));

  // Body segments (draw tail → head so head is on top)
  for (let i = pts.length - 1; i >= 1; i--) {
    const ratio = i / pts.length;
    const r2 = bird.r * (0.35 + 0.55 * (1 - ratio)); // taper toward tail
    const hue = stuckRatio > 0.35 ? `rgb(220,80,80)` : `rgb(${Math.floor(60+60*ratio)},${Math.floor(160+40*ratio)},${Math.floor(60+20*ratio)})`;

    // Scale pattern stripe alternating
    ctx.fillStyle = i % 2 === 0
      ? (stuckRatio > 0.35 ? 'rgba(255,120,120,0.9)' : 'rgba(80,180,60,0.9)')
      : (stuckRatio > 0.35 ? 'rgba(200,50,50,0.9)'   : 'rgba(50,140,40,0.9)');

    ctx.beginPath();
    ctx.arc(pts[i].x, pts[i].y, r2, 0, Math.PI*2);
    ctx.fill();

    // Belly lighter stripe
    ctx.fillStyle = stuckRatio > 0.35 ? 'rgba(255,200,180,0.55)' : 'rgba(180,240,130,0.5)';
    ctx.beginPath();
    ctx.ellipse(pts[i].x, pts[i].y, r2 * 0.5, r2 * 0.7, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // ── Head ────────────────────────────────────────────────────
  ctx.save();
  ctx.translate(x, y);

  // Head direction angle
  let headAngle = 0;
  if (pts.length > 1) {
    headAngle = Math.atan2(y - pts[1].y, x - pts[1].x);
  }
  ctx.rotate(headAngle);

  const HR = bird.r; // head radius

  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.18)';
  ctx.shadowBlur = 8; ctx.shadowOffsetY = 4;

  // Head shape — slightly wider than tall, rounded snout
  const headColor = stuckRatio > 0.35
    ? ctx.createRadialGradient(-HR*0.2,-HR*0.2,2,0,0,HR*1.1)
    : ctx.createRadialGradient(-HR*0.2,-HR*0.2,2,0,0,HR*1.1);
  if (stuckRatio > 0.35) {
    headColor.addColorStop(0, '#ff9999');
    headColor.addColorStop(1, '#cc3333');
  } else {
    headColor.addColorStop(0, '#88dd55');
    headColor.addColorStop(1, '#3a9a1a');
  }
  ctx.fillStyle = headColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, HR * 1.15, HR * 0.92, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  // Head outline
  ctx.strokeStyle = stuckRatio > 0.35 ? '#882222' : '#2a7010';
  ctx.lineWidth = 2; ctx.stroke();

  // Scales pattern on head
  ctx.fillStyle = stuckRatio > 0.35 ? 'rgba(255,150,150,0.4)' : 'rgba(120,220,70,0.4)';
  ctx.beginPath(); ctx.ellipse(HR*0.15, -HR*0.1, HR*0.35, HR*0.22, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-HR*0.2, HR*0.15, HR*0.28, HR*0.18, -0.3, 0, Math.PI*2); ctx.fill();

  // Snout bump
  ctx.fillStyle = stuckRatio > 0.35 ? '#dd5555' : '#55bb30';
  ctx.beginPath(); ctx.ellipse(HR*0.95, 0, HR*0.28, HR*0.38, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = stuckRatio > 0.35 ? '#882222' : '#2a7010';
  ctx.lineWidth = 1.5; ctx.stroke();

  // Nostrils
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(HR*1.08,  HR*0.13, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(HR*1.08, -HR*0.13, 2, 0, Math.PI*2); ctx.fill();

  // Eyes — big & expressive
  const eyeX = HR * 0.35, eyeY = -HR * 0.38;
  // White sclera
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.ellipse(eyeX, eyeY, 6.5, 7, 0.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(eyeX, -eyeY, 6.5, 7, -0.1, 0, Math.PI*2); ctx.fill();

  // Pupils — slit shaped (snake!)
  ctx.fillStyle = stuckRatio > 0.35 ? '#cc0000' : '#1a0a00';
  ctx.beginPath(); ctx.ellipse(eyeX+1, eyeY, 2.2, 5.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(eyeX+1, -eyeY, 2.2, 5.5, 0, 0, Math.PI*2); ctx.fill();

  // Eye shine
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.arc(eyeX+2, eyeY-2, 1.8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(eyeX+2, -eyeY-2, 1.8, 0, Math.PI*2); ctx.fill();

  // Eyebrow ridges
  ctx.strokeStyle = stuckRatio > 0.35 ? '#882222' : '#2a5010';
  ctx.lineWidth = 2.2; ctx.lineCap = 'round';
  if (stuckRatio > 0.35) {
    // Angry brows — angled in
    ctx.beginPath(); ctx.moveTo(eyeX-5, eyeY-9); ctx.lineTo(eyeX+5, eyeY-6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(eyeX-5, -eyeY+9); ctx.lineTo(eyeX+5, -eyeY+6); ctx.stroke();
  } else {
    // Friendly brows — slight arch
    ctx.beginPath(); ctx.moveTo(eyeX-5, eyeY-8); ctx.lineTo(eyeX+5, eyeY-9); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(eyeX-5, -eyeY+8); ctx.lineTo(eyeX+5, -eyeY+9); ctx.stroke();
  }

  // Forked tongue — flickers
  const tongueOut = Math.sin(t * 0.015) > 0.2;
  if (tongueOut) {
    const tLen = stuckRatio > 0.35 ? 18 : 14;
    ctx.strokeStyle = '#ff2266';
    ctx.lineWidth = 2; ctx.lineCap = 'round';
    // Base of tongue
    ctx.beginPath();
    ctx.moveTo(HR * 1.18, 0);
    ctx.lineTo(HR * 1.18 + tLen * 0.55, 0);
    ctx.stroke();
    // Fork left
    ctx.beginPath();
    ctx.moveTo(HR * 1.18 + tLen * 0.55, 0);
    ctx.lineTo(HR * 1.18 + tLen, -5);
    ctx.stroke();
    // Fork right
    ctx.beginPath();
    ctx.moveTo(HR * 1.18 + tLen * 0.55, 0);
    ctx.lineTo(HR * 1.18 + tLen,  5);
    ctx.stroke();
  }

  // Sweat drop when very scared
  if (stuckRatio > 0.55) {
    ctx.fillStyle = '#88ccff';
    ctx.beginPath();
    ctx.moveTo(-HR*0.3, -HR*0.65);
    ctx.quadraticCurveTo(-HR*0.15, -HR*0.35, -HR*0.3, -HR*0.1);
    ctx.quadraticCurveTo(-HR*0.45, -HR*0.35, -HR*0.3, -HR*0.65);
    ctx.fill();
  }

  ctx.restore();

  // ── Invincibility shield ─────────────────────────────────────
  if (invincible > 0) {
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.02);
    const shieldAlpha = (invincible / 180) * (0.4 + 0.4 * pulse);
    ctx.save();
    ctx.globalAlpha = shieldAlpha;
    // Outer glow ring
    ctx.strokeStyle = '#00eeff';
    ctx.shadowColor = '#00eeff';
    ctx.shadowBlur  = 18;
    ctx.lineWidth   = 3 + pulse * 2;
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.r * 1.7 + pulse * 4, 0, Math.PI*2);
    ctx.stroke();
    // Inner tint
    const shGrad = ctx.createRadialGradient(bird.x, bird.y, bird.r, bird.x, bird.y, bird.r*1.7);
    shGrad.addColorStop(0,   'rgba(0,238,255,0.12)');
    shGrad.addColorStop(1,   'rgba(0,180,255,0)');
    ctx.fillStyle = shGrad;
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.r*1.7, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  ctx.textAlign = 'left';
}

function drawParticles() {
  particles.forEach((p, i) => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.035;
    if (p.life <= 0) { particles.splice(i,1); return; }
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ── SCORE ANIMATIONS ──────────────────────────────────────────
let scoreAnims  = [];   // stars flying toward badge
let scorePop    = 0;    // badge scale pop
let badgeGlow   = 0;    // badge glow intensity
let displayScore = 0;   // shown score (animates up toward real score)
let plusAnims   = [];   // "+1" labels that float up
let ripples     = [];   // ring burst at gap

function triggerScoreAnim(wx, wy) {
  // Flying stars toward badge
  const count = 5 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    scoreAnims.push({
      x: wx + (Math.random()-0.5)*40,
      y: wy + (Math.random()-0.5)*30,
      tx: W/2, ty: 27,
      progress: 0,
      delay: i * 0.07,
      size: 10 + Math.random() * 8,
      spin: (Math.random()-0.5) * 0.3,
      angle: 0,
      done: false,
    });
  }
  // "+1" popup at gap
  plusAnims.push({ x: wx, y: wy - 10, life: 1.0 });
  // Ripple ring at gap
  ripples.push({ x: wx, y: wy, r: 10, life: 1.0 });
  scorePop  = 1;
  badgeGlow = 1;
}

function drawHUD() {
  // ── Ripple rings at gap ────────────────────────────────────
  ripples.forEach((rp, i) => {
    rp.r   += 4;
    rp.life -= 0.055;
    if (rp.life <= 0) { ripples.splice(i, 1); return; }
    ctx.save();
    ctx.globalAlpha = rp.life * 0.6;
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  });

  // ── +1 float-up labels ─────────────────────────────────────
  plusAnims.forEach((p, i) => {
    p.y   -= 1.5;
    p.life -= 0.032;
    if (p.life <= 0) { plusAnims.splice(i, 1); return; }
    ctx.save();
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.font = `bold ${18 + Math.floor((1-p.life)*6)}px "Fredoka One"`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#ff8800';
    ctx.shadowBlur = 10;
    ctx.fillText('+1 ⭐', p.x, p.y);
    ctx.restore();
  });

  // ── Animate flying stars ──────────────────────────────────
  for (let i = scoreAnims.length - 1; i >= 0; i--) {
    const s = scoreAnims[i];
    if (s.done) { scoreAnims.splice(i, 1); continue; }
    s.delay -= 0.016;
    if (s.delay > 0) continue;

    s.progress = Math.min(s.progress + 0.055, 1);
    const ease = s.progress < 0.5
      ? 2 * s.progress * s.progress
      : 1 - Math.pow(-2 * s.progress + 2, 2) / 2;
    const cx = s.x + (s.tx - s.x) * ease;
    const cy = s.y + (s.ty - s.y) * ease;
    s.angle += s.spin;

    const alpha = s.progress > 0.85 ? (1 - s.progress) / 0.15 : 1;
    const sz = s.size * (1 - s.progress * 0.4);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(cx, cy);
    ctx.rotate(s.angle);
    ctx.beginPath();
    for (let p = 0; p < 5; p++) {
      const outerA = (Math.PI*2/5)*p - Math.PI/2;
      const innerA = outerA + Math.PI/5;
      if (p===0) ctx.moveTo(Math.cos(outerA)*sz, Math.sin(outerA)*sz);
      else       ctx.lineTo(Math.cos(outerA)*sz, Math.sin(outerA)*sz);
      ctx.lineTo(Math.cos(innerA)*sz*0.42, Math.sin(innerA)*sz*0.42);
    }
    ctx.closePath();
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.strokeStyle = '#FFA500';
    ctx.lineWidth = 1; ctx.stroke();
    ctx.restore();

    if (s.progress >= 1) s.done = true;
  }

  // ── Count display score toward real score ─────────────────
  if (displayScore < score) {
    displayScore = Math.min(score, displayScore + 1);
  }

  // ── Score badge ────────────────────────────────────────────
  scorePop  = Math.max(0, scorePop  - 0.05);
  badgeGlow = Math.max(0, badgeGlow - 0.028);
  const popScale = 1 + scorePop * 0.28;

  ctx.save();
  ctx.translate(W/2, 27);
  ctx.scale(popScale, popScale);

  // Outer glow
  if (badgeGlow > 0) {
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur  = 30 * badgeGlow;
  }

  // Badge background
  ctx.fillStyle = badgeGlow > 0.05
    ? `rgba(255,248,200,${0.92 + badgeGlow*0.08})`
    : 'rgba(255,255,255,0.90)';
  ctx.beginPath();
  ctx.roundRect(-52, -20, 104, 42, 21);
  ctx.fill();

  // Badge border
  ctx.strokeStyle = badgeGlow > 0.05
    ? `rgba(255,${Math.floor(160 + badgeGlow*95)},0,${0.55+badgeGlow*0.45})`
    : '#ff85c0';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Spinning star icon in badge when glowing
  if (badgeGlow > 0.05) {
    const starSpin = Date.now() * 0.006;
    ctx.save();
    ctx.translate(-28, 0);
    ctx.rotate(starSpin);
    ctx.globalAlpha = 0.5 + badgeGlow * 0.5;
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 6;
    ctx.beginPath();
    for (let p = 0; p < 5; p++) {
      const oa = (Math.PI*2/5)*p - Math.PI/2;
      const ia = oa + Math.PI/5;
      if (p===0) ctx.moveTo(Math.cos(oa)*9, Math.sin(oa)*9);
      else       ctx.lineTo(Math.cos(oa)*9, Math.sin(oa)*9);
      ctx.lineTo(Math.cos(ia)*4, Math.sin(ia)*4);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // Score number — bounces on new score
  ctx.font = `${24 + Math.floor(scorePop*6)}px "Fredoka One"`;
  ctx.textAlign = 'center';
  ctx.fillStyle = badgeGlow > 0.05 ? '#cc6600' : '#ff55aa';
  ctx.shadowColor = badgeGlow > 0.05 ? '#ffaa00' : 'transparent';
  ctx.shadowBlur  = badgeGlow > 0.05 ? 6 : 0;
  ctx.fillText('⭐ ' + displayScore, 8, 14);
  ctx.shadowBlur = 0;
  ctx.restore();

  // ── Stuck danger bar ───────────────────────────────────────
  if (bird.stuckTimer > 10) {
    const ratio = Math.min(bird.stuckTimer / 60, 1);
    const barW  = (W - 60) * ratio;
    const barY  = H - 65;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.roundRect(28, barY, W-56, 14, 7); ctx.fill();
    const barGrad = ctx.createLinearGradient(28, 0, 28+barW, 0);
    barGrad.addColorStop(0, '#ffdd55');
    barGrad.addColorStop(1, '#ff5566');
    ctx.fillStyle = barGrad;
    ctx.beginPath(); ctx.roundRect(28, barY, barW, 14, 7); ctx.fill();
    if (ratio > 0.5 && Math.floor(Date.now()/400)%2===0) {
      ctx.font = '11px "Fredoka One"';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#cc2244';
      ctx.fillText('😱 Move quickly! 😱', W/2, barY - 5);
      ctx.textAlign = 'left';
    }
  }
}

function drawStartScreen() {
  // Card
  ctx.fillStyle = 'rgba(255,255,255,0.93)';
  ctx.beginPath(); ctx.roundRect(30, H/2-145, W-60, 285, 28); ctx.fill();
  ctx.strokeStyle = '#ff85c0';
  ctx.lineWidth = 4;
  ctx.stroke();

  // Title
  ctx.textAlign = 'center';
  ctx.font = '38px "Fredoka One"';
  ctx.fillStyle = '#ff55aa';
  ctx.shadowColor = '#ffaad4';
  ctx.shadowBlur = 8;
  ctx.fillText('🌈 BOUNCE', W/2, H/2-85);
  ctx.fillText('BUDDY! 🐾', W/2, H/2-48);
  ctx.shadowBlur = 0;

  ctx.font = '13px "Nunito"';
  ctx.fillStyle = '#aa66aa';
  ctx.fillText('Hold & drag to guide your buddy!', W/2, H/2+5);
  ctx.fillText('Dodge the candy walls 🍭', W/2, H/2+28);

  const blink = Math.floor(Date.now()/500)%2===0;
  if (blink) {
    ctx.font = '16px "Fredoka One"';
    ctx.fillStyle = '#ff88cc';
    ctx.fillText('👆 TAP TO START! 👆', W/2, H/2+80);
  }
  if (highScore > 0) {
    ctx.font = '13px "Fredoka One"';
    ctx.fillStyle = '#ffaa33';
    ctx.fillText('🏆 Best: ' + highScore + ' stars!', W/2, H/2+112);
  }
  ctx.textAlign = 'left';
}

function drawDeadScreen() {
  ctx.fillStyle = 'rgba(255,255,255,0.93)';
  ctx.beginPath(); ctx.roundRect(30, H/2-145, W-60, 295, 28); ctx.fill();
  ctx.strokeStyle = '#ffaa55';
  ctx.lineWidth = 4;
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.font = '30px "Fredoka One"';
  ctx.fillStyle = '#ff7733';
  ctx.shadowColor = '#ffccaa';
  ctx.shadowBlur = 8;
  ctx.fillText('😢 Oops!', W/2, H/2-90);
  ctx.shadowBlur = 0;

  ctx.font = '13px "Nunito"';
  ctx.fillStyle = '#aa6633';
  ctx.fillText('Your buddy got stuck! 🐾', W/2, H/2-55);

  ctx.font = '18px "Fredoka One"';
  ctx.fillStyle = '#ff55aa';
  ctx.fillText('⭐ Score: ' + score, W/2, H/2-15);
  ctx.fillStyle = '#ffaa33';
  ctx.fillText('🏆 Best: ' + highScore, W/2, H/2+18);

  ctx.font = '12px "Nunito"';
  ctx.fillStyle = '#aaaacc';
  ctx.fillText('Hold & drag to guide the ball', W/2, H/2+55);
  ctx.fillText('Bounce off walls — avoid getting stuck!', W/2, H/2+75);

  const blink = Math.floor(Date.now()/500)%2===0;
  if (blink) {
    ctx.font = '16px "Fredoka One"';
    ctx.fillStyle = '#ff88cc';
    ctx.fillText('👆 TAP TO TRY AGAIN! 👆', W/2, H/2+112);
  }
  ctx.textAlign = 'left';
}

// ── COLLISION: resolve ball vs solid rectangle ─────────────────
// Uses previous position to determine which face was hit
function resolveRect(px, py, x1, y1, x2, y2) {
  // px/py = ball centre BEFORE move, bird.x/y = AFTER move
  const br = bird.r;
  // Expanded rect by radius
  const ex1 = x1 - br, ex2 = x2 + br;
  const ey1 = y1 - br, ey2 = y2 + br;

  // Is ball inside expanded rect now?
  if (bird.x < ex1 || bird.x > ex2 || bird.y < ey1 || bird.y > ey2) return false;

  // Was ball outside before? (entry direction)
  const fromLeft   = px <= ex1;
  const fromRight  = px >= ex2;
  const fromTop    = py <= ey1;
  const fromBottom = py >= ey2;

  // Resolve based on entry side (prev pos tells us which face we crossed)
  if (fromLeft)   { bird.x = ex1 - 1; bird.vx = -Math.abs(bird.vx); }
  else if (fromRight)  { bird.x = ex2 + 1; bird.vx =  Math.abs(bird.vx); }
  else if (fromTop)    { bird.y = ey1 - 1; bird.vy = -Math.abs(bird.vy); }
  else if (fromBottom) { bird.y = ey2 + 1; bird.vy =  Math.abs(bird.vy); }
  else {
    // Ball started inside (edge case) — push out by smallest overlap
    const ol = bird.x - ex1, or_ = ex2 - bird.x;
    const ot = bird.y - ey1, ob  = ey2 - bird.y;
    const m = Math.min(ol, or_, ot, ob);
    if      (m === ol)  { bird.x = ex1 - 1; bird.vx = -Math.abs(bird.vx); }
    else if (m === or_) { bird.x = ex2 + 1; bird.vx =  Math.abs(bird.vx); }
    else if (m === ot)  { bird.y = ey1 - 1; bird.vy = -Math.abs(bird.vy); }
    else                { bird.y = ey2 + 1; bird.vy =  Math.abs(bird.vy); }
  }
  return true;
}

// ── UPDATE ────────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;

  // ── Move walls first ────────────────────────────────────────
  wallTimer++;
  if (wallTimer >= WALL_INTERVAL) { wallTimer = 0; spawnWall(); }

  walls.forEach((w, i) => {
    w.y += w.vy;
    if (w.moves) {
      w.gapX += w.moveSpeed;
      if (w.gapX - GAP_W/2 < 10)    { w.gapX = GAP_W/2 + 10;    w.moveSpeed *= -1; }
      if (w.gapX + GAP_W/2 > W - 10) { w.gapX = W - GAP_W/2 - 10; w.moveSpeed *= -1; }
    }
    if (w.y > H + 40 || w.y < -40) walls.splice(i, 1);
  });

  // ── Steer ball toward touch/click target (distance = speed) ──
  if (target.active) {
    const dx = target.x - bird.x;
    const dy = target.y - bird.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 6) {
      const speed = Math.min(MAX_SPEED, Math.max(MIN_SPEED, dist * SPEED_SCALE));
      bird.vx = (dx / dist) * speed;
      bird.vy = (dy / dist) * speed;
    } else {
      bird.vx = 0;
      bird.vy = 0;
    }
  }

  // ── Move ball in SUBSTEPS for reliable collision ─────────────
  const STEPS = 8;
  const svx = bird.vx / STEPS;
  const svy = bird.vy / STEPS;

  for (let s = 0; s < STEPS; s++) {
    const px = bird.x, py = bird.y;
    bird.x += svx;
    bird.y += svy;

    // Screen edges
    if (bird.x - bird.r <= 0) { bird.x = bird.r;     bird.vx =  Math.abs(bird.vx); }
    if (bird.x + bird.r >= W) { bird.x = W - bird.r; bird.vx = -Math.abs(bird.vx); }
    if (bird.y - bird.r <= 0) { bird.y = bird.r;     bird.vy =  Math.abs(bird.vy); }
    if (bird.y + bird.r >= H) { bird.y = H - bird.r; bird.vy = -Math.abs(bird.vy); }

    // Wall collision per substep
    walls.forEach(w => {
      const gLeft  = w.gapX - GAP_W / 2;
      const gRight = w.gapX + GAP_W / 2;
      const wTop    = w.y - WALL_H / 2;
      const wBottom = w.y + WALL_H / 2;

      // Two solid blocks: [0..gLeft] and [gRight..W]
      const hitL = resolveRect(px, py, 0,      wTop, gLeft,  wBottom);
      const hitR = resolveRect(px, py, gRight, wTop, W,      wBottom);

      if (hitL || hitR) {
        if (invincible > 0) {
          burst(bird.x, bird.y, '#88eeff'); // shield deflect
        } else {
          burst(bird.x, bird.y, '#ffddaa');
          bird.stuckTimer++;
        }
      }

      // Score: ball passed cleanly through gap
      if (!w.passed) {
        const crossed = (w.vy > 0 && w.y >= bird.y) || (w.vy < 0 && w.y <= bird.y);
        if (crossed) {
          w.passed = true;
          if (bird.x > gLeft && bird.x < gRight) {
            score++;
            triggerScoreAnim(w.gapX, w.y);
          }
        }
      }
    });

    // Recalc per-substep velocity direction after possible bounce
    // (keep speed magnitude, use updated signs)
  }

  // Trail
  bird.trail.push({x: bird.x, y: bird.y});
  if (bird.trail.length > 40) bird.trail.shift();

  // ── STUCK = bouncing rapidly against walls = lose ─────────────
  // Invincibility after revive
  if (invincible > 0) {
    invincible--;
    bird.stuckTimer = 0;
  }
  if (bird.stuckTimer > 60) die();
  bird.stuckTimer = Math.max(0, bird.stuckTimer - 0.4);
}

// ── LOOP ──────────────────────────────────────────────────────
function loop() {
  update();
  drawBg();
  drawWalls();
  drawParticles();
  drawBird();
  if (state === 'playing') drawHUD();
  if (state === 'start') { drawHUD(); drawStartScreen(); }
  if (state === 'dead')  { drawHUD(); drawDeadScreen(); }
  requestAnimationFrame(loop);
}
loop();
</script>
